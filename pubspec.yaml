name: cm_flutter_app
description: "Billzify - Hotel management app"
publish_to: 'none'
version: 1.0.26+26

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.0
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  printing: ^5.13.1
  pdf: ^3.11.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  image_picker: ^1.1.2
  flutter_local_notifications: ^17.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/