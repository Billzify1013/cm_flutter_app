workflows:
  ios-appstore-workflow:
    name: iOS App Store Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: CodeMagic Integration
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        provisioning_profiles:
          - billzify_appstore_profile
        certificates:
          - billzify_distribution
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Fix bundle identifier after signing
        script: |
          cd ios
          sed -i '' 's/PRODUCT_BUNDLE_IDENTIFIER = com\.billzify\.cm\.[^;]*/PRODUCT_BUNDLE_IDENTIFIER = com.billzify.cm/g' Runner.xcodeproj/project.pbxproj
      - name: Build IPA for App Store
        script: |
          flutter build ipa --release \
            --export-options-plist=ios/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: false
        submit_to_app_store: false